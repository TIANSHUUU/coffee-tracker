<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.css" rel="stylesheet" />
  <link rel="stylesheet" href="diary.css" />
</head>
<body>
<header id="siteHeader"></header>

<main class="list-page">
  <div class="list-head">
    <h1 class="list-title" id="listTitle"></h1>
    <p class="list-intro" id="listIntro"></p>
  </div>
  <div class="controls">
    <input type="text" class="search-box" id="search" />
    <select class="month-select" id="monthFilter"></select>
    <div class="filter-pills" id="filterPills"></div>
  </div>
  <div id="results"></div>
</main>

<script src="diary-common.js"></script>
<script>
(function () {
  const D = window.Diary;
  const ROASTS = ['all', 'filter', 'espresso', 'omni'];
  const state = { q: '', roast: 'all', month: 'all' };
  let ALL = [];

  fetch('diary.json')
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => {
      ALL = (data.entries || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      render();
    })
    .catch(() => { ALL = []; render(); });

  function render() {
    document.documentElement.lang = D.getLang() === 'en' ? 'en' : 'zh';
    document.getElementById('siteHeader').innerHTML = D.renderHeader('diary');
    D.initLangToggle(render);

    document.getElementById('listTitle').textContent = D.ui('listTitle');
    document.getElementById('listIntro').textContent = D.ui('listIntro');

    const search = document.getElementById('search');
    search.placeholder = D.ui('searchPlaceholder');
    search.value = state.q;
    search.oninput = function () { state.q = this.value; renderResults(); };

    renderMonthFilter();
    renderFilters();
    renderResults();
  }

  function renderMonthFilter() {
    const sel = document.getElementById('monthFilter');
    const months = [...new Set(ALL.map(e => (e.date || '').slice(0, 7)).filter(Boolean))];
    sel.innerHTML =
      `<option value="all">${D.esc(D.ui('allMonths'))}</option>` +
      months.map(m => `<option value="${D.esc(m)}">${D.esc(monthLabel(m))}</option>`).join('');
    sel.value = months.includes(state.month) ? state.month : (state.month = 'all', 'all');
    sel.classList.toggle('active', state.month !== 'all');
    sel.onchange = function () {
      state.month = this.value;
      this.classList.toggle('active', state.month !== 'all');
      renderResults();
    };
  }

  function renderFilters() {
    const wrap = document.getElementById('filterPills');
    wrap.innerHTML = ROASTS.map(r => {
      const label = r === 'all' ? D.ui('filterAll') : D.ui('roast.' + r);
      return `<button class="filter-pill${state.roast === r ? ' active' : ''}" data-roast="${r}" type="button">${D.esc(label)}</button>`;
    }).join('');
    wrap.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        state.roast = btn.dataset.roast;
        renderFilters();
        renderResults();
      });
    });
  }

  function renderResults() {
    const q = state.q.trim().toLowerCase();
    const items = ALL.filter(e => {
      if (state.roast !== 'all' && e.roast_profile !== state.roast) return false;
      if (state.month !== 'all' && (e.date || '').slice(0, 7) !== state.month) return false;
      if (q && D.searchHaystack(e).indexOf(q) === -1) return false;
      return true;
    });
    const results = document.getElementById('results');

    if (!ALL.length) {
      results.innerHTML = emptyState('☕', D.ui('emptyList'), D.ui('emptyHint'));
      return;
    }
    if (!items.length) {
      results.innerHTML = emptyState('🔍', D.ui('noMatch'), '');
      return;
    }
    // group by first-brew month (entries are already sorted by date desc)
    const groups = [];
    let cur = null;
    for (const e of items) {
      const key = (e.date || '').slice(0, 7);
      if (!cur || cur.key !== key) { cur = { key, items: [] }; groups.push(cur); }
      cur.items.push(e);
    }
    results.innerHTML = groups.map(g =>
      `<section class="month-group">
        <h2 class="section-title month-head">${D.esc(monthLabel(g.key))}</h2>
        <div class="card-grid">${g.items.map(card).join('')}</div>
      </section>`).join('');
  }

  function monthLabel(key) {
    const [y, m] = key.split('-').map(Number);
    if (!y || !m) return key || '—';
    return new Date(y, m - 1, 1).toLocaleDateString(
      D.getLang() === 'en' ? 'en-AU' : 'zh-CN', { year: 'numeric', month: 'long' });
  }

  function card(e) {
    const cover = (e.images && e.images.length) ? e.images[0] : e.image;
    const thumb = cover
      ? `<img src="${D.esc(cover)}" alt="" />`
      : `<span class="card-thumb-fallback">☕</span>`;
    const flavours = (e.flavours || []).slice(0, 3).map(f =>
      `<span class="chip">${D.esc(f.icon)} ${D.esc(D.t(f.label))}</span>`).join('');
    return `<a class="card" href="diary-detail.html?slug=${encodeURIComponent(e.slug)}">
      <div class="card-thumb" style="background:${D.heroColor(e.color)}">${thumb}</div>
      <div class="card-body">
        <div class="card-name">${D.esc(D.t(e.bean_name))}</div>
        <div class="card-roaster">${D.esc(D.t(e.roaster))}</div>
        <div class="card-flavours">${flavours}</div>
      </div>
    </a>`;
  }

  function emptyState(icon, title, hint) {
    return `<div class="empty-state">
      <div class="empty-state-icon">${icon}</div>
      <p>${D.esc(title)}</p>
      ${hint ? `<small>${D.esc(hint)}</small>` : ''}
    </div>`;
  }
})();
</script>
</body>
</html>
