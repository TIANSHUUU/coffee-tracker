<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.css" rel="stylesheet" />
  <link rel="stylesheet" href="diary.css" />
</head>
<body>
<header id="siteHeader"></header>
<a class="back-link" href="diary.html" id="backLink"></a>
<div id="root"></div>

<script src="diary-common.js"></script>
<script>
(function () {
  const D = window.Diary;
  const slug = new URLSearchParams(location.search).get('slug');
  let ENTRY = null;

  fetch('diary.json')
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => { ENTRY = (data.entries || []).find(e => e.slug === slug) || null; render(); })
    .catch(() => { ENTRY = null; render(); });

  function render() {
    document.documentElement.lang = D.getLang() === 'en' ? 'en' : 'zh';
    document.getElementById('siteHeader').innerHTML = D.renderHeader('diary');
    D.initLangToggle(render);
    document.getElementById('backLink').textContent = D.ui('back');

    const root = document.getElementById('root');
    if (!ENTRY) {
      root.innerHTML = `<div class="detail"><div class="empty-state"><div class="empty-state-icon">🤷</div><p>${D.esc(D.ui('notFound'))}</p></div></div>`;
      return;
    }
    // multi-photo -> magazine spread (A); single/none -> hero layout (B)
    root.innerHTML = imgsOf(ENTRY).length >= 2 ? renderA(ENTRY) : renderB(ENTRY);
  }

  /* ── shared content builders ── */
  const imgsOf = e => (e.images && e.images.length) ? e.images : (e.image ? [e.image] : []);
  const favHtml = e => (e.flavours || []).map(f =>
    `<div class="icon-item"><div class="icon-emoji">${D.esc(f.icon)}</div><div class="icon-label">${D.esc(D.t(f.label))}</div></div>`).join('');
  const storyHtml = e => { const st = D.t(e.story); return st ? st.split('\n\n').map(p => `<p>${D.esc(p)}</p>`).join('') : ''; };
  const tagsHtml = e => (e.tags || []).map(t => `<span class="hero-tag">${D.esc(D.t(t))}</span>`).join('');
  const roasterHtml = e => D.t(e.roaster) ? `<div class="bean-meta">${D.esc(D.t(e.roaster))}</div>` : '';
  const datesHtml = e => {
    const d = [];
    if (e.roast_date) d.push(D.ui('roasted') + ' ' + D.formatDate(e.roast_date));
    if (e.date) d.push(D.ui('firstBrew') + ' ' + D.formatDate(e.date));
    return d.length ? `<div class="bean-dates">${D.esc(d.join(' · '))}</div>` : '';
  };
  const priceHtml = e => e.price_aud ? `<div class="bean-price">$${D.esc(e.price_aud)} AUD${e.weight ? ' / ' + D.esc(e.weight) : ''}</div>` : '';
  const brewMethodHtml = e => (e.brew && D.t(e.brew.method)) ? `<div class="brew-method">${D.esc(D.t(e.brew.method))}</div>` : '';
  const profileRowsHtml = e => e.profile ? D.PROFILE_DIMS.filter(d => e.profile[d]).map(d => D.sliderRow(d, e.profile[d])).join('') : '';
  const summaryBoxHtml = e => { const t = D.t(e.summary); return t ? `<div class="summary-box"><span class="cup">☕</span><span>${D.esc(t)}</span></div>` : ''; };
  const sourceLink = e => e.url ? `<a class="source-link" href="${D.esc(e.url)}" target="_blank" rel="noopener">${D.esc(D.ui('source'))} ↗</a>` : '';
  function specRows(e) {
    const d = e.details; if (!d) return '';
    const rows = [];
    const row = (key, val) => {
      const v = (val && typeof val === 'object') ? D.t(val) : val;
      if (v) rows.push(`<div class="spec-row"><div class="spec-label">${D.esc(D.ui(key))}</div><div class="spec-value">${D.esc(v)}</div></div>`);
    };
    row('producer', d.producer);
    row('farm', d.farm);
    const region = D.t(d.region);
    if (region) rows.push(`<div class="spec-row"><div class="spec-label">${D.esc(D.ui('region'))}</div><div class="spec-value">${d.flag ? D.esc(d.flag) + ' ' : ''}${D.esc(region)}</div></div>`);
    row('altitude', d.altitude);
    row('varietal', d.varietal);
    row('process', d.process);
    return rows.join('');
  }
  function originNotes(e) {
    const n = e.details && D.t(e.details.notes);
    return n ? `<p class="origin-notes">${D.esc(n)}</p>` : '';
  }
  function mapLink(e) {
    const u = e.details && e.details.map_url;
    return u ? `<a class="source-link origin-map" href="${D.esc(u)}" target="_blank" rel="noopener">${D.esc(D.ui('viewOrigin'))} ↗</a>` : '';
  }
  function metaBlockInner(e) {
    const tg = tagsHtml(e);
    return `<h1 class="bean-name">${D.esc(D.t(e.bean_name))}</h1>${roasterHtml(e)}${datesHtml(e)}${priceHtml(e)}${tg ? `<div class="hero-tags hero-tags--static">${tg}</div>` : ''}`;
  }
  const kickerBlock = (key, inner) => inner ? `<div class="kicker">${D.esc(D.ui(key))}</div>${inner}` : '';

  /* ── Layout B: single/none photo — big hero + panels ── */
  function renderB(e) {
    const imgs = imgsOf(e);
    const left = imgs.length ? imgs.map(s => `<img class="hero-photo" src="${D.esc(s)}" alt="" />`).join('') : `<span class="hero-img-fallback">☕</span>`;
    const leftClass = imgs.length ? 'hero-left has-photos' : 'hero-left';
    const leftStyle = imgs.length ? '' : ` style="background:${D.heroColor(e.color)}"`;
    const fb = favHtml(e), sh = storyHtml(e);
    const flavourBlock = fb ? `<div class="hero-sub"><div class="kicker">${D.esc(D.ui('flavours'))}</div><div class="flavour-row">${fb}</div></div>` : '';
    const story = sh ? `<div class="hero-sub"><div class="kicker">${D.esc(D.ui('notes'))}</div><div class="story">${sh}</div></div>` : '';
    const heroSec = `<section class="hero"><div class="${leftClass}"${leftStyle}>${left}</div><div class="hero-right">${metaBlockInner(e)}${flavourBlock}${story}</div></section>`;

    const bm = brewMethodHtml(e);
    const leftCol = bm ? `<div><h2 class="section-title">${D.esc(D.ui('brew'))}</h2>${bm}</div>` : '';
    const pr = profileRowsHtml(e);
    const rightCol = pr ? `<div><h2 class="section-title">${D.esc(D.ui('tasteProfile'))}</h2><div class="taste-grid">${pr}</div></div>` : '';
    const brewSec = (leftCol || rightCol) ? `<section class="panel panel-peach"><div class="brewpair">${leftCol}${rightCol}</div></section>` : '';

    const sb = summaryBoxHtml(e);
    const sumSec = sb ? `<section class="summary-wrap">${sb}</section>` : '';
    const sr = specRows(e), on = originNotes(e), ml = mapLink(e);
    const detSec = (sr || on || ml) ? `<section class="panel panel-blue"><h2 class="section-title">${D.esc(D.ui('details'))}</h2>${sr ? `<div class="spec">${sr}</div>` : ''}${on}${ml}</section>` : '';
    const src = sourceLink(e);
    const srcSec = src ? `<section class="source-wrap">${src}</section>` : '';

    return `<div class="detail">${heroSec}${brewSec}${sumSec}${detSec}${srcSec}</div>`;
  }

  /* ── Layout A: 2+ photos — magazine spread ── */
  function renderA(e) {
    const imgs = imgsOf(e);
    const gallery = imgs.map(s => `<div class="shot"><img src="${D.esc(s)}" alt="" /></div>`).join('');

    let c = `<div class="blk">${metaBlockInner(e)}</div>`;
    const fb = favHtml(e); if (fb) c += `<div class="blk">${kickerBlock('flavours', `<div class="flavour-row">${fb}</div>`)}</div>`;
    const sh = storyHtml(e); if (sh) c += `<div class="blk">${kickerBlock('notes', `<div class="story">${sh}</div>`)}</div>`;
    const bm = brewMethodHtml(e); if (bm) c += `<div class="blk sep"><h2 class="section-title">${D.esc(D.ui('brew'))}</h2>${bm}</div>`;
    const pr = profileRowsHtml(e); if (pr) c += `<div class="blk sep"><h2 class="section-title">${D.esc(D.ui('tasteProfile'))}</h2><div class="taste-grid">${pr}</div></div>`;
    const sb = summaryBoxHtml(e); if (sb) c += `<div class="blk sep">${sb}</div>`;
    const sr = specRows(e), on = originNotes(e), ml = mapLink(e);
    if (sr || on || ml) c += `<div class="blk sep"><h2 class="section-title">${D.esc(D.ui('details'))}</h2>${sr ? `<div class="spec">${sr}</div>` : ''}${on}${ml}</div>`;
    const src = sourceLink(e); if (src) c += `<div class="blk sep">${src}</div>`;

    return `<div class="spread"><aside class="gallery">${gallery}</aside><div class="content">${c}</div></div>`;
  }
})();
</script>
</body>
</html>
