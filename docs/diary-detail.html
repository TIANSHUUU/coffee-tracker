<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.css" rel="stylesheet" />
  <link rel="stylesheet" href="diary.css" />
</head>
<body>
<header id="siteHeader"></header>
<a class="back-link" href="diary.html" id="backLink"></a>
<div class="detail" id="content"></div>

<script src="diary-common.js"></script>
<script>
(function () {
  const D = window.Diary;
  const slug = new URLSearchParams(location.search).get('slug');
  let ENTRY = null;

  fetch('diary.json')
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => {
      ENTRY = (data.entries || []).find(e => e.slug === slug) || null;
      render();
    })
    .catch(() => { ENTRY = null; render(); });

  function render() {
    document.documentElement.lang = D.getLang() === 'en' ? 'en' : 'zh';
    document.getElementById('siteHeader').innerHTML = D.renderHeader('diary');
    D.initLangToggle(render);
    document.getElementById('backLink').textContent = D.ui('back');

    const wrap = document.getElementById('content');
    if (!ENTRY) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🤷</div><p>${D.esc(D.ui('notFound'))}</p></div>`;
      return;
    }
    wrap.innerHTML = hero(ENTRY) + brewPair(ENTRY) + summary(ENTRY) + origin(ENTRY) + source(ENTRY);
  }

  function hero(e) {
    const cover = (e.images && e.images.length) ? e.images[0] : e.image;
    const img = cover ? `<img class="hero-img" src="${D.esc(cover)}" alt="" />` : `<span class="hero-img-fallback">☕</span>`;
    const tags = (e.tags || []).map(t => `<span class="hero-tag">${D.esc(D.t(t))}</span>`).join('');
    const price = e.price_aud ? `<div class="hero-price">$${D.esc(e.price_aud)}</div>` : '';
    const flavours = (e.flavours || []).map(f =>
      `<div class="icon-item"><div class="icon-emoji">${D.esc(f.icon)}</div><div class="icon-label">${D.esc(D.t(f.label))}</div></div>`).join('');
    const flavourBlock = flavours
      ? `<div class="hero-sub"><div class="kicker">${D.esc(D.ui('flavours'))}</div><div class="flavour-row">${flavours}</div></div>` : '';
    const st = D.t(e.story);
    const story = st
      ? `<div class="hero-sub"><div class="kicker">${D.esc(D.ui('notes'))}</div>
         <div class="story">${st.split('\n\n').map(p => `<p>${D.esc(p)}</p>`).join('')}</div></div>` : '';
    const meta = [D.t(e.roaster), D.formatDate(e.date)].filter(Boolean).join(' · ');
    return `<section class="hero">
      <div class="hero-left" style="background:${D.heroColor(e.color)}">${img}${tags ? `<div class="hero-tags">${tags}</div>` : ''}${price}</div>
      <div class="hero-right">
        <h1 class="bean-name">${D.esc(D.t(e.bean_name))}</h1>
        ${meta ? `<div class="bean-meta">${D.esc(meta)}</div>` : ''}
        ${flavourBlock}${story}
      </div>
    </section>`;
  }

  function brewPair(e) {
    let left = '';
    if (e.brew && D.t(e.brew.method)) {
      left = `<div><h2 class="section-title">${D.esc(D.ui('brew'))}</h2><div class="brew-method">${D.esc(D.t(e.brew.method))}</div></div>`;
    }
    let right = '';
    if (e.profile) {
      const rows = D.PROFILE_DIMS.filter(d => e.profile[d]).map(d => D.sliderRow(d, e.profile[d])).join('');
      if (rows) right = `<div><h2 class="section-title">${D.esc(D.ui('tasteProfile'))}</h2><div class="taste-grid">${rows}</div></div>`;
    }
    if (!left && !right) return '';
    return `<section class="panel panel-peach"><div class="brewpair">${left}${right}</div></section>`;
  }

  function summary(e) {
    const t = D.t(e.summary);
    if (!t) return '';
    return `<section class="summary-wrap"><div class="summary-box"><span class="cup">☕</span><span>${D.esc(t)}</span></div></section>`;
  }

  function origin(e) {
    const o = e.origin;
    if (!o) return '';
    const place = [D.t(o.region), D.t(o.country)].filter(Boolean).join(', ');
    const head = `${o.flag ? D.esc(o.flag) + ' ' : ''}${D.esc(place)}`;
    const alt = o.altitude ? `<div class="origin-alt">${D.esc(D.ui('altitude'))}: ${D.esc(o.altitude)}</div>` : '';
    const notesHtml = D.t(o.notes) ? `<div class="origin-notes">${D.esc(D.t(o.notes))}</div>` : '';
    if (!place && !alt && !notesHtml) return '';
    return `<section class="panel panel-blue"><h2 class="section-title">${D.esc(D.ui('origin'))}</h2>${place ? `<div class="origin-name">${head}</div>` : ''}${alt}${notesHtml}</section>`;
  }

  function source(e) {
    if (!e.url) return '';
    return `<section class="source-wrap"><a class="source-link" href="${D.esc(e.url)}" target="_blank" rel="noopener">${D.esc(D.ui('source'))} ↗</a></section>`;
  }
})();
</script>
</body>
</html>
