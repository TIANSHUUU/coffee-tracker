<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.css" rel="stylesheet" />
  <link rel="stylesheet" href="diary.css" />
</head>
<body>
<header id="siteHeader"></header>
<a class="back-link" href="diary.html" id="backLink"></a>
<div class="spread" id="spread">
  <aside class="gallery" id="gallery"></aside>
  <div class="content" id="content"></div>
</div>

<script src="diary-common.js"></script>
<script>
(function () {
  const D = window.Diary;
  const slug = new URLSearchParams(location.search).get('slug');
  let ENTRY = null;

  fetch('diary.json')
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => {
      ENTRY = (data.entries || []).find(e => e.slug === slug) || null;
      render();
    })
    .catch(() => { ENTRY = null; render(); });

  function render() {
    document.documentElement.lang = D.getLang() === 'en' ? 'en' : 'zh';
    document.getElementById('siteHeader').innerHTML = D.renderHeader('diary');
    D.initLangToggle(render);
    document.getElementById('backLink').textContent = D.ui('back');

    const spread = document.getElementById('spread');
    if (!ENTRY) {
      spread.style.display = 'block';
      spread.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">🤷</div>
        <p>${D.esc(D.ui('notFound'))}</p>
      </div>`;
      return;
    }
    document.getElementById('gallery').innerHTML = gallery(ENTRY);
    document.getElementById('content').innerHTML = content(ENTRY);
  }

  // Left column: vertical photo stack. Supports `images` array; falls back to
  // single `image`; otherwise a tinted placeholder. Never empty.
  function gallery(e) {
    const wash = D.heroColor(e.color);
    const imgs = (e.images && e.images.length) ? e.images : (e.image ? [e.image] : []);
    if (!imgs.length) {
      return `<div class="shot" style="background:${wash}"><span class="ph">☕</span></div>`;
    }
    return imgs.map(src =>
      `<div class="shot" style="background:${wash}"><img src="${D.esc(src)}" alt="" /></div>`
    ).join('');
  }

  // Right column: all the written content, hairline-separated.
  function content(e) {
    const meta = [D.t(e.roaster), D.formatDate(e.date)].filter(Boolean).join(' · ');
    const tags = (e.tags || []).map(t => `<span class="hero-tag">${D.esc(D.t(t))}</span>`).join('');

    let out = `<div class="blk">
      <h1 class="bean-name">${D.esc(D.t(e.bean_name))}</h1>
      ${meta ? `<div class="bean-meta">${D.esc(meta)}</div>` : ''}
      ${e.price_aud ? `<div class="bean-price">$${D.esc(e.price_aud)}</div>` : ''}
      ${tags ? `<div class="hero-tags hero-tags--static">${tags}</div>` : ''}
    </div>`;

    out += flavours(e) + notes(e) + brew(e) + profile(e) + summary(e) + origin(e);
    return out;
  }

  function flavours(e) {
    const items = (e.flavours || []).map(f =>
      `<div class="icon-item"><div class="icon-emoji">${D.esc(f.icon)}</div><div class="icon-label">${D.esc(D.t(f.label))}</div></div>`).join('');
    if (!items) return '';
    return `<div class="blk"><div class="kicker">${D.esc(D.ui('flavours'))}</div><div class="flavour-row">${items}</div></div>`;
  }

  function notes(e) {
    const st = D.t(e.story);
    if (!st) return '';
    return `<div class="blk"><div class="kicker">${D.esc(D.ui('notes'))}</div>
      <div class="story">${st.split('\n\n').map(p => `<p>${D.esc(p)}</p>`).join('')}</div></div>`;
  }

  function brew(e) {
    const b = e.brew;
    if (!b) return '';
    const method = D.t(b.method) ? `<div class="brew-method">${D.esc(D.t(b.method))}</div>` : '';
    const groups = D.iconGroup('food', b.food) + D.iconGroup('mood', b.moods) + D.iconGroup('time', b.time);
    if (!method && !groups) return '';
    return `<div class="blk sep"><h2 class="section-title">${D.esc(D.ui('brewPairing'))}</h2>${method}${groups}</div>`;
  }

  function profile(e) {
    if (!e.profile) return '';
    const rows = D.PROFILE_DIMS.filter(d => e.profile[d]).map(d => D.sliderRow(d, e.profile[d])).join('');
    if (!rows) return '';
    return `<div class="blk sep"><h2 class="section-title">${D.esc(D.ui('tasteProfile'))}</h2><div class="taste-grid">${rows}</div></div>`;
  }

  function summary(e) {
    const t = D.t(e.summary);
    if (!t) return '';
    return `<div class="blk sep"><div class="summary-box"><span class="cup">☕</span><span>${D.esc(t)}</span></div></div>`;
  }

  function origin(e) {
    const o = e.origin;
    if (!o) return '';
    const place = [D.t(o.region), D.t(o.country)].filter(Boolean).join(', ');
    const head = `${o.flag ? D.esc(o.flag) + ' ' : ''}${D.esc(place)}`;
    const alt = o.altitude ? `<div class="origin-alt">${D.esc(D.ui('altitude'))}: ${D.esc(o.altitude)}</div>` : '';
    const notesHtml = D.t(o.notes) ? `<div class="origin-notes">${D.esc(D.t(o.notes))}</div>` : '';
    if (!place && !alt && !notesHtml) return '';
    return `<div class="blk sep"><h2 class="section-title">${D.esc(D.ui('origin'))}</h2>${place ? `<div class="origin-name">${head}</div>` : ''}${alt}${notesHtml}</div>`;
  }
})();
</script>
</body>
</html>
