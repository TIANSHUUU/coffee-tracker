name: Weekly Coffee Update

on:
  schedule:
    - cron: '0 1 * * 1'   # Every Monday at 01:00 UTC (11:00 AEDT / 09:00 AEST)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug price check
        run: |
          python - <<'EOF'
          import requests
          s = requests.Session()
          s.headers['User-Agent'] = 'Mozilla/5.0'
          r = s.get('https://www.padrecoffee.com.au/products/brazil-rafael-vinhal-anaerobic-natural.json?country=AU', timeout=20)
          v = r.json()['product']['variants'][0]
          print(f"product.json+country=AU: price={v['price']} currency={v.get('price_currency')}")
          r2 = s.get('https://www.padrecoffee.com.au/products/brazil-rafael-vinhal-anaerobic-natural.json', timeout=20)
          v2 = r2.json()['product']['variants'][0]
          print(f"product.json no param:    price={v2['price']} currency={v2.get('price_currency')}")
          EOF

      - name: Run scraper
        run: python update_coffee_list.py

      - name: Generate web data
        run: python generate_web_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json output/
          git diff --staged --quiet || git commit -m "chore: weekly coffee update $(date +%Y-%m-%d)"
          git push
